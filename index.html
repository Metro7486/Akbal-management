<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akbal Management | Talent Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF9F6;
            --surface-color: rgba(255, 255, 255, 0.6);
            --gold-accent: #c5a059;
            --gold-bright: #d4af37;
            --gold-dark: #8e6d2d;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --glass-border: rgba(197, 160, 89, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #ffffff 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #f3f0e8 0%, transparent 40%);
            padding-top: 80px;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }

        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            padding: 4px;
            z-index: 100;
        }
        .lang-btn {
            padding: 6px 14px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 20px;
        }
        .lang-btn.active {
            background-color: var(--gold-accent);
            color: #fff;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 40px 25px; 
            text-align: center;
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { 
            font-family: 'Cinzel', serif; 
            font-size: 2.8rem; 
            font-weight: 400; 
            color: var(--gold-accent); 
            margin-bottom: 5px; 
            letter-spacing: 8px;
            background: linear-gradient(to bottom, var(--gold-dark), var(--gold-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .subtitle { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            margin-bottom: 40px;
            font-weight: 400;
        }
        .hero-text { 
            font-size: 1rem; 
            line-height: 1.8; 
            margin-bottom: 30px; 
            font-weight: 300; 
            color: #444;
            letter-spacing: 0.5px;
        }
        .hero-text strong { font-weight: 600; color: var(--gold-dark); }
        
        .membership-note { 
            display: block;
            margin-top: 20px;
            font-size: 0.65rem; 
            color: var(--gold-dark); 
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            font-weight: 500;
        }

        .form-container {
            background: var(--surface-color);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .form-container::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-accent), transparent);
            animation: shimmer-border 4s infinite linear;
        }
        
        @keyframes shimmer-border {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block; font-size: 0.65rem; color: var(--text-muted);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%; padding: 14px;
            background-color: rgba(0, 0, 0, 0.015);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 8px; color: var(--text-main);
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem;
            transition: all 0.4s ease;
        }
        .input-group input:focus { 
            outline: none; 
            border-color: var(--gold-accent); 
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.1);
        }
        
        .submit-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--gold-accent), var(--gold-dark));
            color: #fff;
            border: none; border-radius: 8px;
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-top: 10px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        
        .submit-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.3);
            filter: brightness(1.05);
        }

        .submit-btn::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.7s;
            left: -150%;
        }
        .submit-btn:hover::after {
            left: 100%;
        }

        .footer-tags { 
            margin-top: 50px; 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            letter-spacing: 4px; 
            text-transform: uppercase;
            opacity: 0.7;
        }
        #loading, #success-message, #error-message { 
            display: none; 
            margin-top: 25px; 
            font-size: 0.8rem; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #success-message { color: #2e7d32; }
        #error-message { color: #c62828; }
        
        @media (max-width: 480px) {
            body { padding-top: 60px; }
            .logo { font-size: 2.2rem; }
            .form-container { padding: 30px 20px; }
            .lang-toggle { top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <div class="lang-toggle">
        <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <div class="logo">AKBAL</div>
        <div class="subtitle">Management</div>

        <p class="hero-text" id="hero-text"></p>

        <div class="form-container">
            <form id="application-form">
                <div class="input-group">
                    <label for="name" id="label-name"></label>
                    <input type="text" id="name" name="nombre" required placeholder="">
                </div>
                <div class="input-group">
                    <label for="instagram" id="label-instagram"></label>
                    <input type="text" id="instagram" name="instagram" required placeholder="@tu_usuario">
                </div>
                <div class="input-group">
                    <label for="email" id="label-email"></label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label for="whatsapp" id="label-whatsapp"></label>
                    <input type="tel" id="whatsapp" name="whatsapp" required placeholder="+52 123 456 7890">
                </div>
                <button type="submit" class="submit-btn" id="submit-btn"></button>
            </form>
            <div id="loading"></div>
            <div id="success-message"></div>
            <div id="error-message"></div>
        </div>

        <div class="footer-tags">📍 Tulum · Riviera Maya · Cancun</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "akbal-88788",
            appId: "1:152432705627:web:960e6cd06a1af6bc663f7e",
            storageBucket: "akbal-88788.firebasestorage.app",
            apiKey: "AIzaSyCHwx66s-mBg3TeMThceSS9iWAyil9TvJQ",
            authDomain: "akbal-88788.firebaseapp.com",
            messagingSenderId: "152432705627"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const i18n = {
            es: {
                hero: 'Conviértete en una <strong>Arquitecta de Experiencias</strong>.<br><br>Únete a la agencia de Social Concierge más exclusiva. Ingresa tus datos para ser considerada en nuestra próxima fase de selección.<br><span class="membership-note">Membership by application only.</span>',
                labelName: 'Nombre Completo',
                placeholderName: 'Tu nombre completo',
                labelInstagram: 'Instagram',
                placeholderInstagram: '@tu_usuario',
                labelEmail: 'Correo Electrónico',
                labelWhatsapp: 'WhatsApp (Con código de país)',
                submit: 'Solicitar Acceso',
                loading: 'Procesando solicitud...',
                success: '✓ Solicitud recibida. Nos pondremos en contacto contigo pronto.',
                error: '✕ Hubo un error al enviar tus datos. Por favor, intenta de nuevo.'
            },
            en: {
                hero: 'Become an <strong>Experience Architect</strong>.<br><br>Join the most exclusive Social Concierge agency. Enter your details to be considered for our next selection phase.<br><span class="membership-note">Membership by application only.</span>',
                labelName: 'Full Name',
                placeholderName: 'Your full name',
                labelInstagram: 'Instagram',
                placeholderInstagram: '@your_handle',
                labelEmail: 'Email Address',
                labelWhatsapp: 'WhatsApp (With country code)',
                submit: 'Request Access',
                loading: 'Processing request...',
                success: '✓ Application received. We will be in touch soon.',
                error: '✕ There was an error submitting your info. Please try again.'
            }
        };

        window.setLang = function(lang) {
            const t = i18n[lang];
            document.documentElement.lang = lang;
            document.getElementById('hero-text').innerHTML = t.hero;
            document.getElementById('label-name').textContent = t.labelName;
            document.getElementById('name').placeholder = t.placeholderName;
            document.getElementById('label-instagram').textContent = t.labelInstagram;
            document.getElementById('instagram').placeholder = t.placeholderInstagram;
            document.getElementById('label-email').textContent = t.labelEmail;
            document.getElementById('label-whatsapp').textContent = t.labelWhatsapp;
            document.getElementById('submit-btn').textContent = t.submit;
            document.getElementById('loading').textContent = t.loading;
            document.getElementById('success-message').textContent = t.success;
            document.getElementById('error-message').textContent = t.error;
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        }

        setLang('es');

        const form = document.getElementById('application-form');
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');
        const successMsg = document.getElementById('success-message');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            submitBtn.style.display = 'none';
            loading.style.display = 'block';

            const formData = new FormData(form);
            const data = {
                createdAt: serverTimestamp(),
                nombre: formData.get('nombre'),
                instagram: formData.get('instagram'),
                email: formData.get('email'),
                whatsapp: formData.get('whatsapp'),
                source: 'web_application'
            };

            try {
                // Firebase Registration
                await addDoc(collection(db, "talent_applications"), data);
                
                // Fallback/Legacy Sheet Registration (Optional but kept for redundancy)
                fetch('https://api.sheetbest.com/sheets/7f735168-7076-4c70-9015-6ddd6d01ef5c', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Fecha: new Date().toLocaleString('es-MX'),
                        Nombre: data.nombre,
                        Instagram: data.instagram,
                        Email: data.email,
                        WhatsApp: data.whatsapp
                    }),
                }).catch(err => console.error('Sheet sync failed', err));

                form.reset();
                loading.style.display = 'none';
                successMsg.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
                submitBtn.style.display = 'block';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
